  <text x="130" y="466" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">Chunk + embed + store</text>

  <line x1="220" y1="445" x2="370" y2="280" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)" opacity="0.5"/>
