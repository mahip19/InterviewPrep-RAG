  <line x1="235" y1="308" x2="235" y2="340" stroke="#0F6E56" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="235" y1="340" x2="440" y2="340" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="4 3"/>
  <text x="340" y="334" text-anchor="middle" font-size="12" fill="#0F6E56">Query vector</text>

  <line x1="485" y1="308" x2="485" y2="370" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)"/>
