  <text x="340" y="170" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">Orchestrates RAG pipeline</text>

  <line x1="240" y1="188" x2="240" y2="250" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
