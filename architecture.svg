  <text x="340" y="70" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">Chat UI + sources</text>

  <line x1="340" y1="86" x2="340" y2="130" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
